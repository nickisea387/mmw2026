name: Refresh MMW Event Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Manual trigger button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create data directory
        run: mkdir -p data

      - name: Refresh artist images from Deezer
        run: python3 scripts/refresh_images.py
        continue-on-error: true

      - name: Scrape Reddit signals
        run: python3 scripts/scrape_reddit.py
        continue-on-error: true

      - name: Scrape ticket availability
        run: python3 scripts/scrape_tickets.py
        continue-on-error: true

      - name: Calculate trending scores
        run: python3 scripts/check_updates.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh event data [bot]"
            git push
          fi
